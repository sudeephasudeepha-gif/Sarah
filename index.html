<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBD love</title>

<link rel="stylesheet" href="./File/default.css">

<script src="./File/jquery.min.js"></script>
<script src="./File/jscex.min.js"></script>
<script src="./File/jscex-parser.js"></script>
<script src="./File/jscex-jit.js"></script>
<script src="./File/jscex-builderbase.min.js"></script>
<script src="./File/jscex-async.min.js"></script>
<script src="./File/jscex-async-powerpack.min.js"></script>
<script src="./File/functions.js"></script>
<script src="./File/love.js"></script>

<style>
body {
    margin: 0;
    padding: 0;
    background: #ffe;
    text-align: center;
}

/* RESPONSIVE CANVAS FIX */
#canvas {
    width: 100vw;              /* full screen width */
    height: auto;              /* maintain ratio */
    max-width: 1100px;
}

/* TEXT FIX */
#code {
    font-size: 4vw;
    line-height: 1.5;
}

#clock {
    font-size: 3.5vw;
}

/* DESKTOP OVERRIDE */
@media (min-width: 768px) {
    #code { font-size: 20px; }
    #clock { font-size: 16px; }
}
</style>

<script>
function playAudio() {
    document.getElementById("myAudio").play();
}
</script>

</head>

<body>

<audio autoplay id="myAudio">
    <source src="aud.mp3" type="audio/mp3">
</audio>

<div id="text">
<div id="code">
<span>My beautiful wife 💞</span><br>
<span>Happy Birthday 🎈</span><br>
<span>May Allah bless you 🍀</span><br>
<span>And give u many happiness 💕</span><br>
<span>I loved you ❤️</span><br>
<span>And I will always love u 🥺 ❤️</span><br>
<span>Hope u have a great day today ❤️😘</span><br>
</div>
</div>

<div id="clock-box">
<span id="clock">577 days 0 hours 0 minutes 0 seconds</span>
</div>

<!-- IMPORTANT: KEEP ORIGINAL SIZE -->
<canvas id="canvas" width="1100" height="680"></canvas>

<script>
(function() {

    var canvas = $('#canvas');

    if (!canvas[0].getContext) return;

    var width = 1100;   // KEEP ORIGINAL
    var height = 680;   // KEEP ORIGINAL

    var opts = {
        seed: {
            x: width / 2 - 20,
            color: "rgb(190, 26, 37)",
            scale: 2
        },
        branch: [
            [535, 680, 570, 250, 500, 200, 30, 100, [
                [540, 500, 455, 417, 340, 400, 13, 100],
                [550, 445, 600, 356, 680, 345, 12, 100]
            ]]
        ],
        bloom: {
            num: 600
        },
        footer: {
            width: 1200,
            height: 5,
            speed: 10,
        }
    };

    var tree = new Tree(canvas[0], width, height, opts);
    var seed = tree.seed;
    var foot = tree.footer;
    var hold = 1;

    /* MOBILE TOUCH FIX */
    canvas.on("click touchstart", function() {
        playAudio();
        hold = 0;
    });

    var seedAnimate = eval(Jscex.compile("async", function () {
        seed.draw();
        while (hold) {
            $await(Jscex.Async.sleep(10));
        }
        while (seed.canScale()) {
            seed.scale(0.95);
            $await(Jscex.Async.sleep(10));
        }
        while (seed.canMove()) {
            seed.move(0, 2);
            foot.draw();
            $await(Jscex.Async.sleep(10));
        }
    }));

    var growAnimate = eval(Jscex.compile("async", function () {
        do {
            tree.grow();
            $await(Jscex.Async.sleep(10));
        } while (tree.canGrow());
    }));

    var flowAnimate = eval(Jscex.compile("async", function () {
        do {
            tree.flower(2);
            $await(Jscex.Async.sleep(10));
        } while (tree.canFlower());
    }));

    var textAnimate = eval(Jscex.compile("async", function () {
        $("#code").show().typewriter();
    }));

    var runAsync = eval(Jscex.compile("async", function () {
        $await(seedAnimate());
        $await(growAnimate());
        $await(flowAnimate());
        textAnimate().start();
    }));

    runAsync().start();

})();
</script>

</body>
</html>
