<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBD love</title>

<link rel="stylesheet" href="./File/default.css">

<script src="./File/jquery.min.js"></script>
<script src="./File/jscex.min.js"></script>
<script src="./File/jscex-parser.js"></script>
<script src="./File/jscex-jit.js"></script>
<script src="./File/jscex-builderbase.min.js"></script>
<script src="./File/jscex-async.min.js"></script>
<script src="./File/jscex-async-powerpack.min.js"></script>
<script src="./File/functions.js"></script>
<script src="./File/love.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
}

#main, #wrap {
    width: 100%;
    height: 100vh;
}

#code {
    font-size: clamp(22px, 5vw, 36px);
    padding: 15px;
    text-align: center;
    line-height: 1.8;
}

@media (max-width: 600px) {
    #code {
        font-size: 14px;
    }
}
</style>

<script>
function playAudio() {
    var audio = document.getElementById("myAudio");
    audio.play();
}
</script>
</head>

<body>
<div id="main">

<audio id="myAudio">
    <source src="aud.mp3" type="audio/mp3">
</audio>

<div id="wrap">
    <div id="text">
        <div id="code">
            <span class="say"> Happy Birthday Sarah ! 🥳</span><br>
            <span class="say"> God Bless You and give u all the Happiness💕</span><br>
            <span class="say">I Really Miss you 😔</span><br>
        </div>
    </div>

    <div id="clock-box">
        <span id="clock">577 days 0 hours 0 minutes 0 seconds</span>
    </div>

    <canvas id="canvas"></canvas>
</div>
</div>

<script>
(function() {

    var canvas = $('#canvas');

    if (!canvas[0].getContext) {
        return false;
    }

    // ✅ Responsive canvas
    var width = window.innerWidth;
    var height = window.innerHeight;

    canvas.attr("width", width);
    canvas.attr("height", height);

    var opts = {
        seed: {
            x: width / 2,
            color: "rgb(190, 26, 37)",
            scale: 2
        },
        branch: [
            [535, 680, 570, 250, 500, 200, 30, 100, [
                [540, 500, 455, 417, 340, 400, 13, 100, [
                    [450, 435, 434, 430, 394, 395, 2, 40]
                ]],
                [550, 445, 600, 356, 680, 345, 12, 100, [
                    [578, 400, 648, 409, 661, 426, 3, 80]
                ]]
            ]]
        ],
        bloom: {
            num: 500,
            width: width,
            height: height,
        },
        footer: {
            width: width,
            height: 5,
            speed: 10,
        }
    };

    var tree = new Tree(canvas[0], width, height, opts);
    var seed = tree.seed;
    var foot = tree.footer;
    var hold = 1;

    // ✅ Click + Touch support
    canvas.on("click touchstart", function(e) {
        playAudio();

        var offset = canvas.offset();
        var x = (e.pageX || e.originalEvent.touches[0].pageX) - offset.left;
        var y = (e.pageY || e.originalEvent.touches[0].pageY) - offset.top;

        if (seed.hover(x, y)) {
            hold = 0;
            canvas.off("click touchstart");
        }
    });

    var seedAnimate = eval(Jscex.compile("async", function () {
        seed.draw();
        while (hold) {
            $await(Jscex.Async.sleep(10));
        }
        while (seed.canScale()) {
            seed.scale(0.95);
            $await(Jscex.Async.sleep(10));
        }
        while (seed.canMove()) {
            seed.move(0, 2);
            foot.draw();
            $await(Jscex.Async.sleep(10));
        }
    }));

    var growAnimate = eval(Jscex.compile("async", function () {
        do {
            tree.grow();
            $await(Jscex.Async.sleep(10));
        } while (tree.canGrow());
    }));

    var flowAnimate = eval(Jscex.compile("async", function () {
        do {
            tree.flower(2);
            $await(Jscex.Async.sleep(10));
        } while (tree.canFlower());
    }));

    var moveAnimate = eval(Jscex.compile("async", function () {
        tree.snapshot("p1", 240, 0, 610, 680);
        while (tree.move("p1", 500, 0)) {
            foot.draw();
            $await(Jscex.Async.sleep(10));
        }
        foot.draw();
    }));

    var textAnimate = eval(Jscex.compile("async", function () {
        $("#code").show().typewriter();
    }));

    var runAsync = eval(Jscex.compile("async", function () {
        $await(seedAnimate());
        $await(growAnimate());
        $await(flowAnimate());
        $await(moveAnimate());
        textAnimate().start();
    }));

    runAsync().start();

})();
</script>

</body>
</html>
