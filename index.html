<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBD love</title>

<link rel="stylesheet" href="./File/default.css">

<script src="./File/jquery.min.js"></script>
<script src="./File/jscex.min.js"></script>
<script src="./File/jscex-parser.js"></script>
<script src="./File/jscex-jit.js"></script>
<script src="./File/jscex-builderbase.min.js"></script>
<script src="./File/jscex-async.min.js"></script>
<script src="./File/jscex-async-powerpack.min.js"></script>
<script src="./File/functions.js"></script>
<script src="./File/love.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
}

/* FULL WIDTH FIX */
#main, #wrap {
    width: 100vw !important;
    max-width: 100vw !important;
    height: 100vh;
    margin: 0 auto;
    position: relative;
}

/* CANVAS FULLSCREEN */
#canvas {
    width: 100vw !important;
    height: 100vh !important;
    display: block;
}

/* TEXT CENTER */
#text {
    position: absolute;
    top: 15%;
    width: 100%;
    text-align: center;
    color: white;
}

#code {
    font-size: 20px;
    line-height: 30px;
}

/* CLOCK */
#clock-box {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 18px;
}
</style>

<script>
function playAudio() {
    document.getElementById("myAudio").play();
}
</script>

</head>

<body>

<div id="main">

<audio autoplay loop id="myAudio">
    <source src="aud.mp3" type="audio/mp3">
</audio>

<div id="wrap">

    <div id="text">
        <div id="code">
            My beautiful wife 💞<br>
            Happy Birthday 🎈<br>
            May Allah bless you 🍀<br>
            And give u many happiness 💕<br>
            I love you ❤️<br>
            I will always love you 🥺❤️<br>
            Have a great day ❤️😘
        </div>
    </div>

    <div id="clock-box">
        <span id="clock"></span>
    </div>

    <!-- FIXED: removed width & height -->
    <canvas id="canvas"></canvas>

</div>
</div>

<script>
(function() {
    var canvas = $('#canvas');

    if (!canvas[0].getContext) {
        return false;
    }

    // ✅ FULL SCREEN SIZE
    var width = window.innerWidth;
    var height = window.innerHeight;

    canvas.attr("width", width);
    canvas.attr("height", height);

    var opts = {
        seed: {
            x: width / 2,
            color: "rgb(190, 26, 37)",
            scale: 2
        },
        branch: [
            [535, 680, 570, 250, 500, 200, 30, 100]
        ],
        bloom: {
            num: 700,
            width: width,
            height: height
        },
        footer: {
            width: width,
            height: 5,
            speed: 10
        }
    };

    var tree = new Tree(canvas[0], width, height, opts);
    var seed = tree.seed;
    var foot = tree.footer;
    var hold = 1;

    canvas.click(function(e) {
        playAudio();
        hold = 0;
    });

    var seedAnimate = eval(Jscex.compile("async", function () {
        seed.draw();
        while (hold) {
            $await(Jscex.Async.sleep(10));
        }
        while (seed.canScale()) {
            seed.scale(0.95);
            $await(Jscex.Async.sleep(10));
        }
        while (seed.canMove()) {
            seed.move(0, 2);
            foot.draw();
            $await(Jscex.Async.sleep(10));
        }
    }));

    var growAnimate = eval(Jscex.compile("async", function () {
        do {
            tree.grow();
            $await(Jscex.Async.sleep(10));
        } while (tree.canGrow());
    }));

    var flowAnimate = eval(Jscex.compile("async", function () {
        do {
            tree.flower(2);
            $await(Jscex.Async.sleep(10));
        } while (tree.canFlower());
    }));

    var textAnimate = eval(Jscex.compile("async", function () {
        $("#code").show().typewriter();
    }));

    var runAsync = eval(Jscex.compile("async", function () {
        $await(seedAnimate());
        $await(growAnimate());
        $await(flowAnimate());
        textAnimate().start();
    }));

    runAsync().start();

})();
</script>

</body>
</html>
