<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBD Love</title>

<style>
body {
    margin: 0;
    background: #0b1a3a;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
}

#text {
    position: absolute;
    top: 10%;
    width: 100%;
    font-size: 20px;
    display: none;
}

canvas {
    display: block;
}

#tap {
    position: absolute;
    bottom: 20px;
    width: 100%;
    font-size: 18px;
    opacity: 0.7;
}
</style>
</head>

<body>

<div id="text">
    <p>My beautiful wife 💞</p>
    <p>Happy Birthday 🎈</p>
    <p>May Allah bless you 🍀</p>
    <p>And give u many happiness 💕</p>
    <p>I love you ❤️</p>
    <p>I will always love you 🥺❤️</p>
</div>

<div id="tap">👉 Tap anywhere to start</div>

<canvas id="canvas"></canvas>

<audio id="music">
    <source src="aud.mp3" type="audio/mp3">
</audio>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let started = false;
let hearts = [];

function createHeart(x, y) {
    return {
        x: x,
        y: y,
        size: Math.random() * 8 + 4,
        speed: Math.random() * 1 + 0.5
    };
}

function drawHeart(h) {
    ctx.fillStyle = "pink";
    ctx.beginPath();
    ctx.moveTo(h.x, h.y);
    ctx.arc(h.x - h.size/2, h.y - h.size/2, h.size/2, 0, Math.PI, true);
    ctx.arc(h.x + h.size/2, h.y - h.size/2, h.size/2, 0, Math.PI, true);
    ctx.lineTo(h.x, h.y + h.size);
    ctx.fill();
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // create hearts
    if (Math.random() < 0.3) {
        hearts.push(createHeart(Math.random() * canvas.width, canvas.height));
    }

    // update hearts
    hearts.forEach(h => {
        h.y -= h.speed;
        drawHeart(h);
    });

    requestAnimationFrame(animate);
}

canvas.addEventListener("click", start);
canvas.addEventListener("touchstart", start);

function start() {
    if (started) return;
    started = true;

    document.getElementById("tap").style.display = "none";
    document.getElementById("text").style.display = "block";

    document.getElementById("music").play();

    animate();
}
</script>

</body>
</html>
