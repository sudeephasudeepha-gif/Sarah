<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBD love</title>

<link rel="stylesheet" href="./File/default.css">

<script src="./File/jquery.min.js"></script>
<script src="./File/jscex.min.js"></script>
<script src="./File/jscex-parser.js"></script>
<script src="./File/jscex-jit.js"></script>
<script src="./File/jscex-builderbase.min.js"></script>
<script src="./File/jscex-async.min.js"></script>
<script src="./File/jscex-async-powerpack.min.js"></script>
<script src="./File/functions.js"></script>
<script src="./File/love.js"></script>

<style>
body {
    margin: 0;
    padding: 0;
    text-align: center;
    overflow-x: hidden;
}

#wrap {
    width: 100%;
}

#canvas {
    width: 100%;
    height: auto;
}

#code {
    font-size: 5vw; /* responsive text */
    line-height: 1.6;
}

#clock {
    font-size: 4vw;
}

@media (min-width: 768px) {
    #code {
        font-size: 20px;
    }
    #clock {
        font-size: 16px;
    }
}
</style>

<script>
function playAudio() {
    document.getElementById("myAudio").play();
}
</script>

</head>

<body>

<audio autoplay id="myAudio">
    <source src="aud.mp3" type="audio/mp3">
</audio>

<div id="wrap">

<div id="text">
<div id="code">
<span>My beautiful wife 💞</span><br>
<span>Happy Birthday 🎈</span><br>
<span>May Allah bless you 🍀</span><br>
<span>And give u many happiness 💕</span><br>
<span>I loved you ❤️</span><br>
<span>And I will always love u 🥺 ❤️</span><br>
<span>Hope u have a great day today ❤️😘</span><br>
</div>
</div>

<div id="clock-box">
<span id="clock">577 days 0 hours 0 minutes 0 seconds</span>
</div>

<canvas id="canvas"></canvas>

</div>

<script>
(function() {

    var canvas = $('#canvas')[0];
    var ctx = canvas.getContext("2d");

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight * 0.8;
    }

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    var width = canvas.width;
    var height = canvas.height;

    var opts = {
        seed: {
            x: width / 2,
            color: "rgb(190, 26, 37)",
            scale: 2
        },
        branch: [
            [width/2, height, width/2+35, height/3, width/2-35, height/3, 30, 100]
        ],
        bloom: {
            num: 400,
            width: width,
            height: height,
        },
        footer: {
            width: width,
            height: 5,
            speed: 10,
        }
    };

    var tree = new Tree(canvas, width, height, opts);
    var seed = tree.seed;
    var foot = tree.footer;
    var hold = 1;

    $('#canvas').click(function() {
        playAudio();
        hold = 0;
    });

    var seedAnimate = eval(Jscex.compile("async", function () {
        seed.draw();
        while (hold) {
            $await(Jscex.Async.sleep(10));
        }
        while (seed.canScale()) {
            seed.scale(0.95);
            $await(Jscex.Async.sleep(10));
        }
        while (seed.canMove()) {
            seed.move(0, 2);
            foot.draw();
            $await(Jscex.Async.sleep(10));
        }
    }));

    var growAnimate = eval(Jscex.compile("async", function () {
        do {
            tree.grow();
            $await(Jscex.Async.sleep(10));
        } while (tree.canGrow());
    }));

    var flowAnimate = eval(Jscex.compile("async", function () {
        do {
            tree.flower(2);
            $await(Jscex.Async.sleep(10));
        } while (tree.canFlower());
    }));

    var textAnimate = eval(Jscex.compile("async", function () {
        $("#code").show().typewriter();
    }));

    var runAsync = eval(Jscex.compile("async", function () {
        $await(seedAnimate());
        $await(growAnimate());
        $await(flowAnimate());
        textAnimate().start();
    }));

    runAsync().start();

})();
</script>

</body>
</html>
