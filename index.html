<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" 
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xml:lang="en" xmlns="http://www.w3.org/1999/xhtml">

<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>HBD Dr !</title>	    

<link rel="stylesheet" href="./File/default.css">

<script src="./File/jquery.min.js"></script>
<script src="./File/jscex.min.js"></script>
<script src="./File/jscex-parser.js"></script>
<script src="./File/jscex-jit.js"></script>
<script src="./File/jscex-builderbase.min.js"></script>
<script src="./File/jscex-async.min.js"></script>
<script src="./File/jscex-async-powerpack.min.js"></script>
<script src="./File/functions.js"></script>
<script src="./File/love.js"></script>

</head>

<body>

<div id="main">
    <div id="error">Use Chrome / Firefox / Brave</div>

    <!-- 🔊 AUDIO (FINAL FIX) -->
    <audio id="myAudio" preload="auto" playsinline webkit-playsinline>
        <source src="aud.mp3" type="audio/mpeg">
    </audio>

    <div id="wrap">
        <div id="text">
            <div id="code">
                <span class="say">My dear Sarah 💞</span><br>
                <span class="say">Happy Birthday to You 🎈</span><br>
                <span class="say">God bless you 👐</span><br>
                <span class="say">And give you lots of happiness 💞</span><br>
                <span class="say">I hope you have a wonderful future ahead ❣️</span><br>
            </div>
        </div>

        <div id="clock-box">
            <span id="clock">577 days 0 hours 0 minutes 0 seconds</span>
        </div>

        <canvas id="canvas" width="1100" height="680"></canvas>
    </div>
</div>

<script>
(function() {

    var canvas = $('#canvas');

    if (!canvas[0].getContext) {
        $("#error").show();
        return;
    }

    var width = canvas.width();
    var height = canvas.height();

    canvas.attr("width", width);
    canvas.attr("height", height);

    var opts = {
        seed: {
            x: width / 2 - 20,
            color: "rgb(190, 26, 37)",
            scale: 2
        },
        branch: [
            [535,680,570,250,500,200,30,100,[
                [540,500,455,417,340,400,13,100,[
                    [450,435,434,430,394,395,2,40]
                ]],
                [550,445,600,356,680,345,12,100,[
                    [578,400,648,409,661,426,3,80]
                ]],
                [539,281,537,248,534,217,3,40],
                [546,397,413,247,328,244,9,80,[
                    [427,286,383,253,371,205,2,40],
                    [498,345,435,315,395,330,4,60]
                ]],
                [546,357,608,252,678,221,6,100,[
                    [590,293,646,277,648,271,2,80]
                ]]
            ]]
        ],
        bloom: {
            num: 700,
            width: 1080,
            height: 650
        },
        footer: {
            width: 1200,
            height: 5,
            speed: 10
        }
    };

    var tree = new Tree(canvas[0], width, height, opts);
    var seed = tree.seed;
    var foot = tree.footer;

    var hold = 1;
    var audio = document.getElementById("myAudio");
    var started = false;

    // 🔥 MOBILE AUDIO UNLOCK
    function unlockAudio() {
        audio.muted = true;
        audio.play().then(() => {
            audio.pause();
            audio.currentTime = 0;
            audio.muted = false;
        }).catch(()=>{});
    }

    document.addEventListener("touchstart", unlockAudio, { once: true });
    document.addEventListener("click", unlockAudio, { once: true });

    // ❤️ PLAY ONLY WHEN HEART CLICKED
    function handleStart(x, y) {
        if (seed.hover(x, y) && !started) {
            started = true;

            audio.currentTime = 0;
            audio.muted = false;
            audio.volume = 1.0;

            audio.play().catch(err => {
                console.log("Audio error:", err);
            });

            hold = 0;
            canvas.removeClass('hand');
        }
    }

    // DESKTOP
    canvas.on("click", function(e) {
        var offset = canvas.offset();
        var x = e.pageX - offset.left;
        var y = e.pageY - offset.top;
        handleStart(x, y);
    });

    // MOBILE
    canvas.on("touchstart", function(e) {
        var offset = canvas.offset();
        var touch = e.originalEvent.touches[0];

        var x = touch.pageX - offset.left;
        var y = touch.pageY - offset.top;

        handleStart(x, y);
    });

    canvas.mousemove(function(e) {
        var offset = canvas.offset();
        var x = e.pageX - offset.left;
        var y = e.pageY - offset.top;
        canvas.toggleClass('hand', seed.hover(x, y));
    });

    var seedAnimate = eval(Jscex.compile("async", function () {
        seed.draw();
        while (hold) {
            $await(Jscex.Async.sleep(10));
        }
        while (seed.canScale()) {
            seed.scale(0.95);
            $await(Jscex.Async.sleep(10));
        }
        while (seed.canMove()) {
            seed.move(0, 2);
            foot.draw();
            $await(Jscex.Async.sleep(10));
        }
    }));

    var growAnimate = eval(Jscex.compile("async", function () {
        do {
            tree.grow();
            $await(Jscex.Async.sleep(10));
        } while (tree.canGrow());
    }));

    var flowAnimate = eval(Jscex.compile("async", function () {
        do {
            tree.flower(4);
            $await(Jscex.Async.sleep(10));
        } while (tree.canFlower());
    }));

    var moveAnimate = eval(Jscex.compile("async", function () {
        tree.snapshot("p1", 240, 0, 610, 680);
        while (tree.move("p1", 500, 0)) {
            foot.draw();
            $await(Jscex.Async.sleep(10));
        }
        foot.draw();
        tree.snapshot("p2", 500, 0, 610, 680);

        canvas.parent().css("background", "url(" + tree.toDataURL('image/png') + ")");
        canvas.css("background", "#ffe");
        $await(Jscex.Async.sleep(300));
        canvas.css("background", "none");
    }));

    var textAnimate = eval(Jscex.compile("async", function () {
        $("#code").show().typewriter();
    }));

    var runAsync = eval(Jscex.compile("async", function () {
        $await(seedAnimate());
        $await(growAnimate());
        $await(flowAnimate());
        $await(moveAnimate());
        textAnimate().start();
    }));

    runAsync().start();

})();
</script>

</body>
</html>
